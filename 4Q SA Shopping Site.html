<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IDC Shops</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fredoka', sans-serif; background: linear-gradient(to right, #ffd6ec, #ffeaf5); margin: 20px; }
        h1 { text-align: center; color: #ff4da6; }
        #cartIcon { position: fixed; top: 20px; right: 20px; background: #ff66b2; color: white; padding: 10px 15px; border-radius: 50px; cursor: pointer; font-weight: bold; z-index: 1000; }
        #cartPanel { position: fixed; top: 70px; right: 20px; width: 340px; background: #fff0f6; padding: 15px; border-radius: 15px; display: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product { background: white; padding: 15px; border-radius: 15px; text-align: center; }
        .product img { width: 120px; height: 120px; object-fit: cover; border-radius: 10px; }
        button { margin-top: 8px; padding: 8px 12px; border: none; border-radius: 10px; background: #ff66b2; color: white; cursor: pointer; }
        .cart-item { background: white; padding: 8px; margin-bottom: 5px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .total { font-weight: bold; color: #ff4da6; margin-top: 10px; }
        form { margin-top: 15px; }
        input { width: 100%; padding: 8px; margin-bottom: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

    <h1>IDC Shops</h1>
    <div id="cartIcon" onclick="toggleCart()">🛒 <span id="cartCount">0</span></div>
    <div class="products" id="productList"></div>

    <div id="cartPanel">
        <h3>Your Cart</h3>
        <div id="cartList"></div>
        <div class="total" id="total"></div>
        <h3>Checkout</h3>
        <form action="http://52.74.133.173/cs3/checkout.php" method="POST" onsubmit="prepareDataForTeacher()">
            <input type="text" name="cust_name" placeholder="Name" required>
            <input type="text" name="cust_addr" placeholder="Address" required>
            <input type="email" name="cust_email" placeholder="Email" required>
            <input type="hidden" name="cust_order" id="cust_order">
            <button type="submit">Complete Checkout</button>
        </form>
    </div>

    <script>
        const products = [
            {name:"Dubai Chewy Cookie", price:6700, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRdBIAbrZYN3CzY6SNdqYagUSeIBdd_-_6xgg&sg"},
            {name:"Pop It Fidget Toy", price:200, img:"https://www.simplycutetees.com/cdn/shop/products/BTOY006-MT_1024x1024_eb65e2ac-465c-4bac-b7ba-6d67ee53056e_2000x.jpg?v=1622851203"},
            {name:"Usagi Plushy", price:800, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRdXvIM_B9hqb2z2clYM5L1du9oYpsyAjeAbw&s"},
            {name:"Ilocos Empanada", price:6000, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSH2OcGzzlzcU0Fb-Rb21HrpFeO7tO8DQqyvA&s"},
            {name:"Robux Gift Card", price:1500, img:"https://assets.wakefern.com/is/image/wakefern/76750394508-001?$Mi9Product_detail$"},
            {name:"Spotify Premium", price:100, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSkrfEBqCyeHCJryOgMQPb-Wi8aivBXdRiLgg&s"},
            {name:"Unicorn Slime", price:7000, img:"https://i.etsystatic.com/10839763/r/il/7c9944/4664572464/il_1080xN.4664572464_9pzk.jpg"},
            {name:"Sushi", price:410, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR7QoDlvvRPYg_SAyVz3U_6OKtUP12Myy7bIg&s"},
            {name:"Iphone 17 Pro Max", price:100000, img:"https://inbox.ph/wp-content/uploads/2025/10/iPhone-17-Pro-main.jpg"},
            {name:"Chicken Shawarma", price:120, img:"https://hips.hearstapps.com/hmg-prod/images/190130-chicken-shwarma-horizontal-1549421250.png?crop=0.668xw:1.00xh;0.168xw,0&resize=1200:*"},
            {name:"Mystery Fidget Toy", price:1000, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQKHkJTQ37cYCqzEtc-27-d_zrH_aKUBoNlQA&s"},
            {name:"Jelly Cat", price:4000, img:"https://cdn-images.farfetch-contents.com/30/38/51/93/30385193_59431530_600.jpg"},
            {name:"Rainbow Airpods", price:80000, img:"https://www.skinit.com/cdn/shop/products/love-is-love-rainbow-apple-airpods-skin-1557181440_SKNGAYPRDX6AAIRPD-PR-01_543f20b7-1ebb-4901-991b-0196747b1817_600x.jpg?v=1686409310"},
            {name:"Adopt Me MFR Unicorn", price:20000, img:"https://i.ebayimg.com/images/g/gEAAAOSwI-JnY~Sr/s-l2400.jpg"},
            {name:"Konu Crunch", price:15000, img:"https://modernmamamnl.com/cdn/shop/files/ginee_20250926112306131_7497719824_2048x.png?v=1758857099"},
            {name:"Milo", price:180, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRsuRCWlLEPNtlFNJ_XVDRC0ydYORASEcweDA&s"},
            {name:"Discord Nitro", price:1000, img:"https://storage.ghost.io/c/12/7b/127b828b-bdc2-4972-9cf2-de857df9c324/content/images/2024/09/Discord-Nitro-Badges-Update---New-Badges-Explained--September-2024-.webp"},
            {name:"YouTube Premium", price:6000, img:"https://bdtechpark.com/wp-content/uploads/2024/12/Untitled-design22.png"},
            {name:"Leebit Plush", price:200, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcROtJ-yMRrtXF3J7UlrveV8AUTTDjgItJJvCg&s"},
            {name:"Han Quokka Plush", price:200, img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQpi4Kcs2rB-mBQKM4b0-QKGFdeRAQv8SIVVg&s"}
        ];

        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        function displayProducts() {
            let list = document.getElementById("productList");
            list.innerHTML = "";
            products.forEach((p, i) => {
                list.innerHTML += <div class="product"><img src="${p.img}"><h4>${p.name}</h4><p>₱${p.price}</p><button onclick="addToCart(${i})">Add</button></div>;
            });
        }
        function addToCart(i) { cart.push(products[i]); save(); displayCart(); }
        function removeItem(i) { cart.splice(i, 1); save(); displayCart(); }
        
        function displayCart() {
            let list = document.getElementById("cartList");
            let total = 0;
            list.innerHTML = "";
            cart.forEach((item, i) => {
                total += item.price;
                list.innerHTML += <div class="cart-item">${item.name} - ₱${item.price} <button onclick="removeItem(${i})">❌</button></div>;
            });
            document.getElementById("total").innerText = "Total: ₱" + total;
            document.getElementById("cartCount").innerText = cart.length;
        }

        function prepareDataForTeacher() {
            let cleanData = cart.map(item => {
                return {
                    prod_name: item.name,
                    prod_price: item.price
                };
            });
            document.getElementById("cust_order").value = JSON.stringify(cleanData);
        }

        function save() { localStorage.setItem("cart", JSON.stringify(cart)); }
        function toggleCart() { let p = document.getElementById("cartPanel"); p.style.display = p.style.display === "block" ? "none" : "block"; }

        displayProducts();
        displayCart();
    </script>
</body>
</html>
